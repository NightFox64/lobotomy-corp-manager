name: Wails Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact_name: windows-amd64
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact_name: linux-amd64
          - os: macos-latest
            platform: darwin/amd64
            artifact_name: macos-intel
          - os: macos-latest
            platform: darwin/arm64
            artifact_name: macos-arm64

    runs-on: ${{ matrix.os }}
    
    defaults:
      run:
        working-directory: ./lobotomy-corp-manager 

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: ./lobotomy-corp-manager/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache-dependency-path: ./lobotomy-corp-manager/frontend/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Add GOBIN to PATH
        shell: bash
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Build Wails App (Windows)
        if: runner.os == 'Windows'
        run: wails build -platform windows/amd64 -clean

      - name: Build Wails App (Linux/macOS)
        if: runner.os != 'Windows'
        run: wails build -platform ${{ matrix.platform }} -tags webkit2gtk_4_1 -clean

      - name: Create macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd build/bin
          # Находим .app файл и пакуем его в DMG
          APP_NAME=$(ls -d *.app | head -n 1)
          hdiutil create -volname "Lobotomy Corp Manager" -srcfolder "$APP_NAME" -ov -format UDZO "../../lobotomy-corp-manager-${{ matrix.artifact_name }}.dmg"
        working-directory: ./lobotomy-corp-manager

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.artifact_name }}
          path: |
            lobotomy-corp-manager/build/bin/*.exe
            lobotomy-corp-manager/build/bin/lobotomy-corp-manager
            lobotomy-corp-manager/*.dmg
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            all-artifacts/**/*.exe
            all-artifacts/**/*.dmg
            all-artifacts/**/lobotomy-corp-manager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}